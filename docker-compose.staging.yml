version: "3.8"

services:
  atlas-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    image: atlas:staging
    container_name: atlas-staging
    restart: on-failure:3
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      # Load from .env.staging file or environment variables
      - DATABASE_URL=${DATABASE_URL}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    env_file:
      - .env.staging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - atlas-staging-network
    labels:
      - "com.atlas.environment=staging"
      - "com.atlas.version=${VERSION:-latest}"

  # Optional: Database for staging
  postgres:
    image: postgres:15-alpine
    container_name: atlas-postgres-staging
    restart: on-failure:3
    environment:
      POSTGRES_DB: atlas_staging
      POSTGRES_USER: ${DB_USER:-atlas}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    networks:
      - atlas-staging-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-atlas} -d atlas_staging"]
      interval: 30s
      timeout: 5s
      retries: 3
    profiles:
      - database

  # Optional: Redis for staging
  redis:
    image: redis:7-alpine
    container_name: atlas-redis-staging
    restart: on-failure:3
    command: redis-server --requirepass ${REDIS_PASSWORD:-staging_redis_pass}
    volumes:
      - redis_staging_data:/data
    networks:
      - atlas-staging-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    profiles:
      - cache

volumes:
  postgres_staging_data:
  redis_staging_data:

networks:
  atlas-staging-network:
    driver: bridge
