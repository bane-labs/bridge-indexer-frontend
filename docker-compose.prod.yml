version: "3.8"

services:
  atlas-app:
    image: ghcr.io/thedanielmark/atlas:production
    container_name: atlas-production
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      # Load from .env.production file or environment variables
      - DATABASE_URL=${DATABASE_URL}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    env_file:
      - .env.production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - atlas-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=atlas-network"
      - "traefik.http.routers.atlas.rule=Host(`atlas.yourdomain.com`)"
      - "traefik.http.routers.atlas.entrypoints=websecure"
      - "traefik.http.routers.atlas.tls.certresolver=letsencrypt"
      - "traefik.http.services.atlas.loadbalancer.server.port=3000"

  # Optional: Nginx reverse proxy (if not using Traefik)
  nginx:
    image: nginx:alpine
    container_name: atlas-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - atlas-app
    networks:
      - atlas-network
    profiles:
      - nginx

  # Optional: Database (if not using external service)
  postgres:
    image: postgres:15-alpine
    container_name: atlas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: atlas
      POSTGRES_USER: ${DB_USER:-atlas}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d
    networks:
      - atlas-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-atlas} -d atlas"]
      interval: 30s
      timeout: 5s
      retries: 3
    profiles:
      - database

  # Optional: Redis for caching/sessions
  redis:
    image: redis:7-alpine
    container_name: atlas-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - atlas-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    profiles:
      - cache

volumes:
  postgres_data:
  redis_data:

networks:
  atlas-network:
    driver: bridge
