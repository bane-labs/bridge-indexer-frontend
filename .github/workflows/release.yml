name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version Packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release Pull Request or Tag
        id: changesets
        uses: changesets/action@v1
        with:
          title: "chore(release): version packages"
          commit: "chore(release): version packages"
          version: pnpm changeset:version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if version commit
        id: version-check
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if [[ "$COMMIT_MSG" == "chore(release): version packages" ]]; then
            echo "is_version_commit=true" >> $GITHUB_OUTPUT
          else
            echo "is_version_commit=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Releases
        if:
          steps.changesets.outputs.hasChangesets == 'false' &&
          steps.version-check.outputs.is_version_commit == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Read package.json files to get current versions
            const packages = [
              { name: '@atlas/ui', path: 'packages/ui' },
              { name: '@atlas/config', path: 'packages/config' }
            ];

            // Get all existing tags
            const { data: tags } = await github.rest.repos.listTags({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            const existingTags = new Set(tags.map(t => t.name));

            for (const pkg of packages) {
              try {
                const pkgJsonPath = path.join(pkg.path, 'package.json');
                const pkgJson = JSON.parse(fs.readFileSync(pkgJsonPath, 'utf8'));
                const version = pkgJson.version;
                const tagName = `${pkg.name}@${version}`;

                // Skip if tag already exists
                if (existingTags.has(tagName)) {
                  console.log(`Tag ${tagName} already exists, skipping...`);
                  continue;
                }

                // Read changelog if it exists
                let body = `Release ${pkg.name} version ${version}`;
                const changelogPath = path.join(pkg.path, 'CHANGELOG.md');
                if (fs.existsSync(changelogPath)) {
                  const changelog = fs.readFileSync(changelogPath, 'utf8');
                  // Extract the latest version section
                  const versionRegex = new RegExp(`## ${version.replace(/\./g, '\\.')}[\\s\\S]*?(?=## \\d|$)`);
                  const match = changelog.match(versionRegex);
                  if (match) {
                    body = match[0].trim();
                  }
                }

                // Create the tag
                console.log(`Creating tag ${tagName}...`);
                await github.rest.git.createRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `refs/tags/${tagName}`,
                  sha: context.sha
                });

                // Create GitHub Release
                console.log(`Creating release for ${tagName}...`);
                await github.rest.repos.createRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag_name: tagName,
                  name: tagName,
                  body: body,
                  draft: false,
                  prerelease: version.includes('-')
                });

                console.log(`✅ Created release ${tagName}`);
              } catch (error) {
                console.error(`Failed to create release for ${pkg.name}:`, error.message);
              }
            }
